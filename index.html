<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5대 플랫폼 콘텐츠 최적화 생성기 | 유쌤클래스</title>
<meta name="description" content="AI가 네이버 블로그, 티스토리, 인스타그램, 페이스북, 유튜브에 최적화된 제목, 포스팅, 키워드를 자동 생성합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* [스타일 시트 부분은 기존과 동일하므로 생략하지 않고 전체 포함합니다] */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root, [data-theme="light"] {
    --purple: #6C63FF; --purple-dark: #4834d4;
    --naver: #03C75A; --tistory: #FF5A4A; --instagram: #E1306C; --facebook: #1877F2; --youtube: #FF0000;
    --text: #1a1a2e; --text-secondary: #555; --text-light: #666; --text-muted: #999;
    --bg: #f5f6fa; --card: #ffffff; --card-hover: #f8f8fb;
    --border: #e4e4e8; --border-light: #eee;
    --radius: 16px;
    --shadow-sm: 0 2px 20px rgba(0,0,0,.03); --shadow-md: 0 8px 28px rgba(0,0,0,.08);
    --post-bg: #fafafa; --spinner-track: #eee; --progress-track: #eee;
    --error-bg: #fff5f5; --error-border: #fed7d7; --error-text: #c53030;
    --copied-bg: #f0fff4; --copied-border: #c6f6d5;
    --community-bg: #f8f9fc; --community-border: #eee;
    --link-card-bg: #fff; --link-card-border: #e8e8ec; --link-card-hover: #f5f6fa;
  }
  [data-theme="dark"] {
    --text: #e8e8f0; --text-secondary: #b0b0c0; --text-light: #9090a8; --text-muted: #707088;
    --bg: #13131e; --card: #1e1e2e; --card-hover: #252538;
    --border: #2e2e42; --border-light: #2a2a3e;
    --shadow-sm: 0 2px 20px rgba(0,0,0,.15); --shadow-md: 0 8px 28px rgba(0,0,0,.25);
    --post-bg: #1a1a2a; --spinner-track: #2a2a3e; --progress-track: #2a2a3e;
    --error-bg: #2d1b1b; --error-border: #5c2626; --error-text: #ff8888;
    --copied-bg: #1a2e1a; --copied-border: #2a5a2a;
    --community-bg: #1a1a28; --community-border: #2a2a3e;
    --link-card-bg: #1e1e2e; --link-card-border: #2e2e42; --link-card-hover: #282840;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; transition: background .3s, color .3s; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes progressAnim { 0% { width: 5%; } 100% { width: 95%; } }
  .container { max-width: 900px; margin: 0 auto; padding: 36px 32px; }
  .top-bar { display: flex; justify-content: space-between; margin-bottom: 24px; }
  .home-btn, .theme-toggle { padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); cursor: pointer; font-weight: 600; color: var(--text-secondary); }
  .header { text-align: center; margin-bottom: 32px; }
  .badge { display: inline-block; color: var(--purple); background: rgba(108,99,255,.1); padding: 7px 20px; border-radius: 20px; margin-bottom: 14px; font-weight: 800; }
  .platform-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .platform-card { background: var(--card); border: 2.5px solid var(--border); border-radius: var(--radius); padding: 30px 12px; cursor: pointer; text-align: center; transition: all .3s; }
  .platform-card.selected { border-color: var(--purple); transform: translateY(-5px); }
  .input-wrapper { display: flex; background: var(--card); border: 2.5px solid var(--border); border-radius: var(--radius); padding: 5px; margin-top: 20px; }
  .topic-input { flex: 1; border: none; padding: 15px; background: transparent; color: var(--text); font-size: 16px; }
  .gen-btn { padding: 14px 32px; border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; }
  .post-box { background: var(--post-bg); padding: 28px; border-radius: var(--radius); white-space: pre-wrap; margin-top: 20px; }
  /* [추가 스타일 생략 - 기존 코드의 스타일을 유지합니다] */
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <button class="home-btn" onclick="goHome()">🏠 홈</button>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 다크모드</button>
  </div>

  <div class="header">
    <div class="badge">유쌤AI콘텐츠마케팅최적화도구</div>
    <h1><span style="color:var(--purple); font-size:42px;">5</span>대 플랫폼 콘텐츠 최적화 생성기</h1>
    <p>주제를 입력하면 맞춤형 콘텐츠를 생성합니다.</p>
  </div>

  <div id="step1" class="step-section">
    <div class="platform-grid" id="platformGrid"></div>
  </div>

  <div id="step2" class="step-section" style="display:none;">
    <div id="selectedBadge" style="text-align:center; margin-bottom:20px;"></div>
    <div class="input-wrapper">
      <input type="text" id="topicInput" class="topic-input" placeholder="주제를 입력하세요">
      <button class="gen-btn" id="genBtn" onclick="generate()">🚀 생성하기</button>
    </div>
  </div>

  <div id="loadingArea" class="loading" style="display:none; text-align:center; padding:50px;">
    <p id="loadingMsg">AI가 콘텐츠를 분석하고 있습니다...</p>
    <div style="width:100%; height:4px; background:#eee; margin-top:20px;">
        <div id="progressFill" style="height:100%; width:0%; transition: width 20s;"></div>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none; color:red; padding:20px; text-align:center;"></div>

  <div id="step3" class="results" style="display:none;">
    <div id="resultHeader"></div>
    <div id="contentArea"></div>
    <div class="bottom-actions" id="bottomActions" style="text-align:center; margin-top:30px;"></div>
  </div>
</div>

<script>
/** * ⚠️ 필독: 여기에 복사한 Gemini API 키를 넣으세요!
 */
const GEMINI_API_KEY = "AIzaSyBWETCP_FrG-2QtDXlJEarXXJUiQEfFC5w"; 

// 설정 데이터
const ICONS = { naver: 'N', tistory: 'T', instagram: 'I', facebook: 'F', youtube: 'Y' };
const P = [
  {id:"naver",name:"네이버 블로그",color:"#03C75A",desc:"검색 최적화",ph:"예: AI 활용 마케팅"},
  {id:"tistory",name:"티스토리",color:"#FF5A4A",desc:"구글 SEO",ph:"예: IT 트렌드 가이드"},
  {id:"instagram",name:"인스타그램",color:"#E1306C",desc:"해시태그 전략",ph:"예: 카페 브이로그"},
  {id:"facebook",name:"페이스북",color:"#1877F2",desc:"커뮤니티 공유",ph:"예: 유용한 꿀팁"},
  {id:"youtube",name:"유튜브",color:"#FF0000",desc:"영상 SEO",ph:"예: 제품 리뷰"}
];
const PR = {
  naver: "네이버 블로그 형식: 친근한 말투, 상세한 설명, 소제목 활용.",
  tistory: "티스토리 형식: 전문적인 톤, H2/H3 구조화, 구글 검색 최적화.",
  instagram: "인스타그램 형식: 감성적인 문구, 이모지 활용, 핵심 해시태그 포함.",
  facebook: "페이스북 형식: 공유를 유도하는 질문형, 간결한 요약.",
  youtube: "유튜브 형식: 시청자의 클릭을 유도하는 제목, 상세 설명란 구성."
};

let sp = null, rd = null, sti = 0, ct = '';

// 초기화 및 테마
function loadTheme() { renderGrid(); }
function toggleTheme() { document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'none' : 'invert(1)'; }

function renderGrid() {
  document.getElementById('platformGrid').innerHTML = P.map(p => `
    <div class="platform-card" id="pc-${p.id}" onclick="pick('${p.id}')">
      <div style="font-size:30px; margin-bottom:10px;">${ICONS[p.id]}</div>
      <div style="font-weight:800">${p.name}</div>
      <div style="font-size:12px; color:#999">${p.desc}</div>
    </div>
  `).join('');
}

function pick(id) {
  sp = P.find(p => p.id === id);
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('topicInput').placeholder = sp.ph;
  document.getElementById('genBtn').style.background = sp.color;
  document.getElementById('selectedBadge').innerHTML = `<b style="color:${sp.color}">${sp.name} 선택됨</b>`;
}

function goHome() { location.reload(); }

/** * 핵심: Gemini API 호출 함수
 */
async function generate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { alert('주제를 입력하세요!'); return; }
  
  ct = topic;
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  
  document.getElementById('step2').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('progressFill').style.width = '90%';
  document.getElementById('progressFill').style.background = sp.color;

  // 제미나이에게 줄 프롬프트 설정
  const kwL = sp.id === 'instagram' ? '해시태그' : '키워드';
  const promptText = `
    당신은 대한민국 최고의 ${sp.name} 마케팅 전문가입니다. 2026년 최신 트렌드를 반영하세요.
    주제: "${topic}"
    
    요구사항:
    1. 추천 제목 5개를 만들어주세요.
    2. ${sp.name} 성격에 맞는 최적화된 포스팅 본문을 작성하세요.
    3. 관련 ${kwL} 10개를 만들어주세요.
    
    반드시 다음 JSON 형식으로만 답변하세요(다른 설명은 하지 마세요):
    {
      "titles": ["제목1", "제목2", "제목3", "제목4", "제목5"],
      "post": "본문 내용...",
      "keywords": ["키워드1", "키워드2", ...]
    }
  `;

  try {
    // 2026년 기준 가장 빠른 Gemini 1.5 Flash 모델 호출
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }]
      })
    });

    const data = await response.json();
    
    if (data.error) throw new Error(data.error.message);

    // AI 응답에서 텍스트 추출 (JSON 외의 마크다운 제거)
    let rawText = data.candidates[0].content.parts[0].text;
    let cleanJson = rawText.replace(/```json|```/g, '').trim();
    rd = JSON.parse(cleanJson);

    showResults();
  } catch (err) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').innerText = "오류 발생: " + err.message + "\nAPI 키가 올바른지 확인해주세요.";
    btn.disabled = false;
  }
}

function showResults() {
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
  
  let h = `<h2 style="color:${sp.color}; text-align:center;">${sp.name} 추천 결과</h2>`;
  
  h += `<div class="post-box"><b>📌 추천 제목:</b>\n${rd.titles.map((t,i) => (i+1)+'. '+t).join('\n')}</div>`;
  h += `<div class="post-box"><b>📝 본문 내용:</b>\n${rd.post}</div>`;
  h += `<div class="post-box"><b>🏷️ 키워드/해시태그:</b>\n${rd.keywords.join(' ')}</div>`;
  
  document.getElementById('contentArea').innerHTML = h;
  document.getElementById('bottomActions').innerHTML = `<button class="gen-btn" style="background:#666" onclick="goHome()">🏠 처음으로</button>`;
}

window.onload = loadTheme;
</script>
</body>
</html>
