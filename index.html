<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5대 플랫폼 콘텐츠 최적화 생성기 | 유쌤클래스</title>
<meta name="description" content="AI가 네이버 블로그, 티스토리, 인스타그램, 페이스북, 유튜브에 최적화된 제목, 포스팅, 키워드를 자동 생성합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="light"] {
    --purple: #6C63FF; --purple-dark: #4834d4;
    --naver: #03C75A; --tistory: #FF5A4A; --instagram: #E1306C; --facebook: #1877F2; --youtube: #FF0000;
    --text: #1a1a2e; --text-secondary: #555; --text-light: #666; --text-muted: #999;
    --bg: #f5f6fa; --card: #ffffff; --card-hover: #f8f8fb;
    --border: #e4e4e8; --border-light: #eee;
    --radius: 16px;
    --shadow-sm: 0 2px 20px rgba(0,0,0,.03); --shadow-md: 0 8px 28px rgba(0,0,0,.08);
    --post-bg: #fafafa; --spinner-track: #eee; --progress-track: #eee;
    --error-bg: #fff5f5; --error-border: #fed7d7; --error-text: #c53030;
    --copied-bg: #f0fff4; --copied-border: #c6f6d5;
    --community-bg: #f8f9fc; --community-border: #eee;
    --link-card-bg: #fff; --link-card-border: #e8e8ec; --link-card-hover: #f5f6fa;
  }
  [data-theme="dark"] {
    --text: #e8e8f0; --text-secondary: #b0b0c0; --text-light: #9090a8; --text-muted: #707088;
    --bg: #13131e; --card: #1e1e2e; --card-hover: #252538;
    --border: #2e2e42; --border-light: #2a2a3e;
    --shadow-sm: 0 2px 20px rgba(0,0,0,.15); --shadow-md: 0 8px 28px rgba(0,0,0,.25);
    --post-bg: #1a1a2a; --spinner-track: #2a2a3e; --progress-track: #2a2a3e;
    --error-bg: #2d1b1b; --error-border: #5c2626; --error-text: #ff8888;
    --copied-bg: #1a2e1a; --copied-border: #2a5a2a;
    --community-bg: #1a1a28; --community-border: #2a2a3e;
    --link-card-bg: #1e1e2e; --link-card-border: #2e2e42; --link-card-hover: #282840;
  }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased; transition: background .3s, color .3s;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes progressAnim { 0% { width: 5%; } 50% { width: 65%; } 90% { width: 88%; } 100% { width: 95%; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  @keyframes checkPop { 0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); } }

  /* ══════════════════════════════════════
     LAYOUT — PC (default, 880px max)
     ══════════════════════════════════════ */
  .container { max-width: 900px; margin: 0 auto; padding: 36px 32px 28px; min-height: 100vh; }

  /* Top Bar */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .home-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--card); color: var(--text-secondary); font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; text-decoration: none;
  }
  .home-btn:hover { background: var(--card-hover); border-color: var(--purple); color: var(--purple); }
  .home-btn svg { width: 16px; height: 16px; }
  .theme-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--card); cursor: pointer; font-family: inherit;
    font-size: 12px; font-weight: 600; color: var(--text-secondary); transition: all .2s;
  }
  .theme-toggle:hover { border-color: var(--purple); color: var(--purple); }
  .theme-toggle .icon { font-size: 16px; }

  /* Steps */
  .steps-wrap { margin-bottom: 32px; }
  .steps-indicator { display: flex; align-items: center; justify-content: center; }
  .step-dot {
    width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; transition: all .3s; background: var(--border); color: var(--text-muted);
  }
  .step-dot.active { background: var(--purple); color: #fff; box-shadow: 0 3px 14px rgba(108,99,255,.35); }
  .step-dot.done { background: var(--naver); color: #fff; }
  .step-line { width: 72px; height: 2px; background: var(--border); transition: background .3s; }
  .step-line.active { background: var(--purple); }
  .step-labels { display: flex; justify-content: center; gap: 60px; margin-top: 8px; }
  .step-label { font-size: 12px; color: var(--text-muted); font-weight: 600; transition: color .3s; }
  .step-label.active { color: var(--purple); }
  .step-label.done { color: var(--naver); }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .badge {
    display: inline-block; font-size: 13px; font-weight: 800; letter-spacing: 1px;
    color: var(--purple); background: rgba(108,99,255,.1);
    padding: 7px 20px; border-radius: 20px; margin-bottom: 14px;
  }
  .header h1 { font-size: 32px; font-weight: 900; line-height: 1.3; margin-bottom: 10px; }
  .header h1 .accent { color: var(--purple); font-size: 42px; }
  .header p { font-size: 14px; color: var(--text-light); line-height: 1.8; }

  /* Platform Cards */
  .step-section { animation: fadeUp .5s ease; }
  .step-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 24px; }
  .platform-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
  }
  .platform-card {
    position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 30px 12px 24px;
    background: var(--card); border: 2.5px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    transition: all .3s cubic-bezier(.4,0,.2,1);
  }
  .platform-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
  .platform-card.selected { transform: translateY(-5px); }
  .platform-card .check-circle {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 900;
    opacity: 0; transform: scale(0); transition: all .3s;
  }
  .platform-card.selected .check-circle { opacity: 1; animation: checkPop .4s ease forwards; }
  .platform-card .p-icon-wrap {
    width: 60px; height: 60px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center; transition: transform .3s;
  }
  .platform-card:hover .p-icon-wrap { transform: scale(1.08); }
  .platform-card .p-icon-wrap svg { width: 32px; height: 32px; }
  .platform-card .p-name { font-size: 13px; font-weight: 800; text-align: center; }
  .platform-card .p-desc { font-size: 11px; color: var(--text-muted); font-weight: 500; text-align: center; }

  /* Step 2 */
  .selected-platform-badge { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .sp-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 20px; border-radius: 24px; font-size: 14px; font-weight: 700; color: #fff;
  }
  .sp-badge svg { width: 16px; height: 16px; }
  .sp-change { font-size: 13px; color: var(--purple); cursor: pointer; font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
  .input-wrapper {
    display: flex; align-items: center; background: var(--card);
    border: 2.5px solid var(--border); border-radius: var(--radius);
    padding: 5px 5px 5px 18px; box-shadow: var(--shadow-sm);
    transition: border-color .25s, box-shadow .25s;
  }
  .input-wrapper:focus-within { border-color: var(--purple); box-shadow: 0 4px 24px rgba(108,99,255,.12); }
  .input-icon { font-size: 22px; flex-shrink: 0; }
  .topic-input {
    flex: 1; border: none; outline: none; font-size: 16px; padding: 15px 14px;
    background: transparent; font-family: inherit; color: var(--text);
  }
  .topic-input::placeholder { color: var(--text-muted); }
  .gen-btn {
    flex-shrink: 0; padding: 14px 32px; border: none; border-radius: 12px;
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all .2s;
  }
  .gen-btn:disabled { opacity: .4; cursor: not-allowed; }
  .gen-btn:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.1); }
  .date-tag { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; }

  /* Loading */
  .loading { text-align: center; padding: 56px 20px; animation: fadeUp .4s ease; }
  .spinner-wrap { position: relative; width: 56px; height: 56px; margin: 0 auto 20px; }
  .spinner-ring {
    width: 56px; height: 56px; border: 4px solid var(--spinner-track);
    border-radius: 50%; animation: spin .75s linear infinite; position: absolute; top: 0; left: 0;
  }
  .spinner-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .spinner-icon svg { width: 24px; height: 24px; }
  .loading-text { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; }
  .loading-dots { animation: pulse 1s infinite; }
  .progress-bar { max-width: 320px; height: 4px; background: var(--progress-track); border-radius: 2px; margin: 0 auto; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; }

  /* Error */
  .error-box { padding: 16px 22px; background: var(--error-bg); color: var(--error-text); border-radius: 12px; font-size: 14px; border: 1px solid var(--error-border); margin-bottom: 20px; }

  /* Results */
  .results { animation: fadeUp .5s ease; }
  .result-platform-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
    padding-bottom: 18px; border-bottom: 2px solid var(--border-light);
  }
  .rph-icon svg { width: 36px; height: 36px; }
  .rph-info h2 { font-size: 22px; font-weight: 900; margin-bottom: 2px; }
  .rph-info p { font-size: 13px; color: var(--text-muted); }
  .rph-actions { margin-left: auto; display: flex; gap: 8px; }
  .new-btn {
    padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--card); font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; color: var(--text-secondary); transition: all .2s; white-space: nowrap;
  }
  .new-btn:hover { background: var(--card-hover); border-color: var(--purple); color: var(--purple); }
  .section { margin-bottom: 32px; }
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .section-title { font-size: 17px; font-weight: 800; margin: 0; }
  .titles-list { display: flex; flex-direction: column; gap: 10px; }
  .title-card {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px;
    background: var(--card); border-radius: 12px; border: 1px solid var(--border-light);
    border-left: 4px solid var(--border); cursor: pointer; transition: all .2s;
  }
  .title-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,.06); }
  .title-num {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 800;
  }
  .title-text { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.55; }
  .sel-badge { font-size: 11px; color: #fff; padding: 4px 12px; border-radius: 6px; font-weight: 700; flex-shrink: 0; }
  .post-box { background: var(--post-bg); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 28px; max-height: 560px; overflow-y: auto; }
  .post-box::-webkit-scrollbar { width: 6px; }
  .post-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .post-text { margin: 0; font-size: 15px; line-height: 1.95; white-space: pre-wrap; word-break: break-word; font-family: 'Noto Sans KR', sans-serif; color: var(--text-secondary); }
  .kw-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
  .kw { display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid transparent; }
  .copy-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--text-secondary); transition: all .2s; white-space: nowrap; }
  .copy-btn:hover { background: var(--card-hover); }
  .copy-btn.copied { background: var(--copied-bg); border-color: var(--copied-border); color: var(--naver); }
  .bottom-actions { display: flex; gap: 12px; justify-content: center; padding-top: 20px; border-top: 1px solid var(--border-light); margin-top: 24px; }
  .copy-all-btn { padding: 14px 36px; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
  .copy-all-btn:hover { opacity: .9; transform: translateY(-1px); }

  /* Community */
  .community { margin-top: 52px; padding: 36px 32px; border-radius: var(--radius); background: var(--community-bg); border: 1px solid var(--community-border); text-align: center; }
  .community-title { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
  .community-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; }
  .community-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
  .community-link {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 16px; border-radius: 12px;
    background: var(--link-card-bg); border: 1.5px solid var(--link-card-border);
    text-decoration: none; color: var(--text-secondary);
    font-size: 13px; font-weight: 600; transition: all .2s; font-family: inherit;
  }
  .community-link:hover { border-color: var(--purple); color: var(--purple); background: var(--link-card-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.06); }
  .community-link .cl-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }

  .footer { text-align: center; margin-top: 28px; padding: 22px 0; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border-light); }

  /* ══════════════════════════════════════
     TABLET (max-width: 768px)
     ══════════════════════════════════════ */
  @media (max-width: 768px) {
    .container { padding: 24px 20px 20px; }
    .header h1 { font-size: 26px; }
    .header h1 .accent { font-size: 34px; }
    .header p { font-size: 13px; }
    .platform-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .platform-card { padding: 24px 10px 20px; }
    .platform-card .p-icon-wrap { width: 52px; height: 52px; border-radius: 15px; }
    .platform-card .p-icon-wrap svg { width: 28px; height: 28px; }
    .step-line { width: 48px; }
    .step-labels { gap: 38px; }
    .result-platform-header { flex-wrap: wrap; }
    .rph-actions { margin-left: 0; margin-top: 8px; width: 100%; justify-content: flex-start; }
  }

  /* ══════════════════════════════════════
     MOBILE PHONE (max-width: 480px)
     ══════════════════════════════════════ */
  @media (max-width: 480px) {
    .container { padding: 16px 14px 16px; }

    /* Top bar */
    .home-btn { padding: 8px 12px; font-size: 12px; gap: 4px; border-radius: 8px; }
    .home-btn svg { width: 14px; height: 14px; }
    .theme-toggle { padding: 7px 10px; font-size: 11px; gap: 5px; border-radius: 8px; }
    .theme-toggle .icon { font-size: 14px; }

    /* Steps */
    .steps-wrap { margin-bottom: 20px; }
    .step-dot { width: 30px; height: 30px; font-size: 12px; }
    .step-line { width: 28px; height: 2px; }
    .step-labels { gap: 18px; margin-top: 5px; }
    .step-label { font-size: 10px; }

    /* Header */
    .header { margin-bottom: 20px; }
    .badge { font-size: 10px; padding: 5px 14px; margin-bottom: 10px; letter-spacing: .5px; }
    .header h1 { font-size: 22px; }
    .header h1 .accent { font-size: 28px; }
    .header p { font-size: 12px; line-height: 1.7; }
    .header p br { display: none; }

    /* Platform Grid — 2 columns + centered last */
    .step-title { font-size: 16px; margin-bottom: 16px; }
    .platform-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .platform-grid .platform-card:nth-child(5) { grid-column: 1 / -1; max-width: 52%; margin: 0 auto; }
    .platform-card { padding: 22px 10px 18px; gap: 7px; border-width: 2px; border-radius: 14px; }
    .platform-card .check-circle { width: 20px; height: 20px; font-size: 11px; top: 7px; right: 7px; }
    .platform-card .p-icon-wrap { width: 48px; height: 48px; border-radius: 14px; }
    .platform-card .p-icon-wrap svg { width: 26px; height: 26px; }
    .platform-card .p-name { font-size: 12px; }
    .platform-card .p-desc { font-size: 9.5px; }

    /* Step 2 — Input */
    .selected-platform-badge { gap: 8px; margin-bottom: 14px; }
    .sp-badge { padding: 7px 14px; font-size: 12px; border-radius: 20px; }
    .sp-badge svg { width: 14px; height: 14px; }
    .sp-change { font-size: 11px; }
    .input-wrapper { border-radius: 12px; padding: 3px 3px 3px 12px; border-width: 2px; }
    .input-icon { font-size: 18px; }
    .topic-input { font-size: 14px; padding: 12px 10px; }
    .gen-btn { padding: 12px 18px; font-size: 14px; border-radius: 10px; }
    .date-tag { font-size: 10.5px; margin-top: 8px; }

    /* Loading */
    .loading { padding: 36px 16px; }
    .spinner-wrap { width: 46px; height: 46px; margin-bottom: 14px; }
    .spinner-ring { width: 46px; height: 46px; border-width: 3px; }
    .spinner-icon svg { width: 20px; height: 20px; }
    .loading-text { font-size: 13px; margin-bottom: 12px; }
    .progress-bar { max-width: 220px; height: 3px; }

    /* Error */
    .error-box { padding: 12px 14px; font-size: 12.5px; border-radius: 10px; }

    /* Results */
    .result-platform-header { flex-direction: column; text-align: center; gap: 8px; padding-bottom: 14px; margin-bottom: 20px; }
    .rph-icon svg { width: 28px; height: 28px; }
    .rph-info h2 { font-size: 18px; }
    .rph-info p { font-size: 11.5px; }
    .rph-actions { margin-left: 0; justify-content: center; gap: 6px; width: 100%; }
    .new-btn { padding: 8px 14px; font-size: 12px; border-radius: 8px; flex: 1; text-align: center; }

    .section { margin-bottom: 22px; }
    .section-head { margin-bottom: 10px; }
    .section-title { font-size: 14px; }
    .titles-list { gap: 7px; }
    .title-card { padding: 12px 12px; gap: 10px; border-radius: 10px; border-left-width: 3px; }
    .title-num { width: 24px; height: 24px; border-radius: 6px; font-size: 11px; }
    .title-text { font-size: 13px; line-height: 1.5; }
    .sel-badge { font-size: 9px; padding: 3px 8px; }

    .post-box { padding: 16px; border-radius: 12px; max-height: 400px; }
    .post-text { font-size: 13px; line-height: 1.85; }

    .kw-wrap { gap: 6px; }
    .kw { padding: 6px 11px; font-size: 11.5px; border-radius: 16px; }

    .copy-btn { padding: 6px 12px; font-size: 11.5px; border-radius: 8px; }
    .bottom-actions { padding-top: 14px; margin-top: 16px; gap: 8px; }
    .copy-all-btn { padding: 12px 24px; font-size: 14px; border-radius: 10px; width: 100%; }

    /* Community */
    .community { margin-top: 32px; padding: 24px 16px; border-radius: 14px; }
    .community-title { font-size: 14px; }
    .community-sub { font-size: 11px; margin-bottom: 16px; }
    .community-links { gap: 7px; }
    .community-link { padding: 8px 12px; font-size: 11px; border-radius: 10px; gap: 5px; }
    .community-link .cl-icon { width: 20px; height: 20px; border-radius: 5px; }
    .community-link .cl-icon svg { width: 12px; height: 12px; }

    /* Footer */
    .footer { margin-top: 20px; padding: 16px 0; font-size: 10.5px; }
  }

  /* ══════════════════════════════════════
     WIDE DESKTOP (min-width: 1200px)
     ══════════════════════════════════════ */
  @media (min-width: 1200px) {
    .container { max-width: 960px; padding: 48px 40px 36px; }
    .header h1 { font-size: 36px; }
    .header h1 .accent { font-size: 48px; }
    .header p { font-size: 15px; }
    .platform-card { padding: 34px 16px 28px; }
    .platform-card .p-icon-wrap { width: 68px; height: 68px; border-radius: 20px; }
    .platform-card .p-icon-wrap svg { width: 36px; height: 36px; }
    .platform-card .p-name { font-size: 14px; }
    .platform-card .p-desc { font-size: 12px; }
  }
</style>
</head>
<body>

  <div class="top-bar">

let sp=null,rd=null,sti=0,ct='',lt=null;

function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('themeIcon').textContent=d?'🌙':'☀️';document.getElementById('themeLabel').textContent=d?'다크모드':'라이트모드';try{localStorage.setItem('theme',d?'light':'dark');}catch{}}
function loadTheme(){try{if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeIcon').textContent='☀️';document.getElementById('themeLabel').textContent='라이트모드';}}catch{}}

const GEMINI_API_KEY = 'AIzaSyBWETCP_FrG-2QtDXlJEarXXJUiQEfFC5w';

function setStep(n){for(let i=1;i<=3;i++){const d=document.getElementById('dot'+i),l=document.getElementById('label'+i);d.classList.remove('active','done');l.classList.remove('active','done');if(i<n){d.classList.add('done');l.classList.add('done');d.textContent='✓';}else if(i===n){d.classList.add('active');l.classList.add('active');d.textContent=i;}else d.textContent=i;}for(let i=1;i<=2;i++)document.getElementById('line'+i).classList.toggle('active',i<n);document.getElementById('step1').style.display=n===1?'block':'none';document.getElementById('step2').style.display=n===2?'block':'none';document.getElementById('step3').style.display=n===3?'block':'none';document.getElementById('loadingArea').style.display='none';document.getElementById('errorBox').style.display='none';}

function renderGrid(){document.getElementById('platformGrid').innerHTML=P.map(p=>`<div class="platform-card" id="pc-${p.id}" onclick="pick('${p.id}')"><div class="check-circle" style="background:${p.color}">✓</div><div class="p-icon-wrap" style="background:${p.color}">${ICONS[p.id]}</div><div class="p-name">${p.name}</div><div class="p-desc">${p.desc}</div></div>`).join('');}

function pick(id){sp=P.find(p=>p.id===id);document.querySelectorAll('.platform-card').forEach(el=>{el.classList.remove('selected');el.style.borderColor='var(--border)';el.style.boxShadow='none';});const c=document.getElementById('pc-'+id);c.classList.add('selected');c.style.borderColor=sp.color;c.style.boxShadow=`0 8px 28px ${sp.color}25`;setTimeout(()=>{setStep(2);document.getElementById('selectedBadge').innerHTML=`<span class="sp-badge" style="background:${sp.color}">${IC16[sp.id]} ${sp.name}</span><span class="sp-change" onclick="goHome()">다른 플랫폼 선택</span>`;document.getElementById('topicInput').placeholder=sp.ph;document.getElementById('genBtn').style.background=sp.color;setTimeout(()=>document.getElementById('topicInput').focus(),100);},300);}

function goHome(){sp=null;rd=null;sti=0;ct='';document.getElementById('topicInput').value='';setStep(1);renderGrid();window.scrollTo({top:0,behavior:'smooth'});}

async function generate(){const topic=document.getElementById('topicInput').value.trim();if(!topic){alert('주제를 입력해주세요!');return;}
const apiKey=GEMINI_API_KEY;if(!apiKey||apiKey==='YOUR_API_KEY_HERE'){alert('⚠️ API 키가 설정되지 않았습니다.\nindex.html 파일을 열어 GEMINI_API_KEY 값을 입력해주세요.');return;}
ct=topic;const p=sp,btn=document.getElementById('genBtn');btn.disabled=true;btn.textContent='생성 중...';document.getElementById('step2').style.display='none';const la=document.getElementById('loadingArea');la.style.display='block';document.getElementById('spinnerRing').style.borderTopColor=p.color;document.getElementById('spinnerIcon').innerHTML=ICLG[p.id].replace(/width="36"/g,'width="24"').replace(/height="36"/g,'height="24"');const pf=document.getElementById('progressFill');pf.style.background=`linear-gradient(90deg,${p.color},${p.color}aa)`;pf.style.animation='none';void pf.offsetHeight;pf.style.animation='progressAnim 25s ease-out forwards';const msgs=LM[p.id];let mi=0;document.getElementById('loadingMsg').innerHTML='🔍 '+msgs[0]+'...<span class="loading-dots">...</span>';lt=setInterval(()=>{mi=(mi+1)%msgs.length;document.getElementById('loadingMsg').innerHTML='✨ '+msgs[mi]+'...<span class="loading-dots">...</span>';},3000);rd=null;sti=0;
const kwL=p.id==='instagram'?'해시태그':'키워드',kwN=p.id==='instagram'?15:10;
const prompt=`당신은 대한민국 최고의 ${p.name} 콘텐츠 마케팅 전문가입니다. 2026년 3월 19일 기준 최신 트렌드를 반영합니다.

반드시 아래 JSON 형식으로만 응답하세요. 마크다운 백틱이나 다른 텍스트 없이 순수 JSON만 출력하세요.

{"titles":["제목1","제목2","제목3","제목4","제목5"],"post":"최적화된 포스팅 본문","keywords":[${Array.from({length:kwN},(_,i)=>`"${kwL}${i+1}"`).join(',')}]}

${PR[p.id]}

주제: "${topic}"

위 주제로 ${p.name}에 최적화된 제목 5개, 포스팅 글, ${kwL}를 JSON으로 생성해주세요.`;
try{
const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.9,maxOutputTokens:8192,responseMimeType:"application/json"}
  })
});
const data=await resp.json();
if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
if(!data.candidates||!data.candidates[0])throw new Error('응답을 받지 못했습니다. API 키를 확인해주세요.');
const txt=data.candidates[0].content.parts.map(p=>p.text||'').join('');
rd=JSON.parse(txt.replace(/```json|```/g,'').trim());
clearInterval(lt);la.style.display='none';setStep(3);renderRes();window.scrollTo({top:0,behavior:'smooth'});
}catch(err){clearInterval(lt);la.style.display='none';document.getElementById('errorBox').style.display='block';document.getElementById('errorBox').innerHTML='⚠️ '+err.message;setStep(2);document.getElementById('selectedBadge').innerHTML=`<span class="sp-badge" style="background:${p.color}">${IC16[p.id]} ${p.name}</span><span class="sp-change" onclick="goHome()">다른 플랫폼 선택</span>`;document.getElementById('topicInput').placeholder=p.ph;document.getElementById('genBtn').style.background=p.color;}finally{btn.disabled=false;btn.textContent='🚀 생성하기';}}

function renderRes(){const p=sp;document.getElementById('resultHeader').innerHTML=`<div class="rph-icon">${ICLG[p.id]}</div><div class="rph-info"><h2 style="color:${p.color}">${p.name} 최적화 콘텐츠</h2><p>주제: ${esc(ct)}</p></div><div class="rph-actions"><button class="new-btn" onclick="reGen()">🔄 다시 생성</button><button class="new-btn" onclick="goHome()">🏠 처음으로</button></div>`;renderSec();document.getElementById('bottomActions').innerHTML=`<button class="copy-all-btn" style="background:${p.color}" onclick="copyAll(this)">📦 전체 콘텐츠 복사</button>`;}
function renderSec(){const p=sp,d=rd,si=sti,kwL=p.id==='instagram'?'해시태그':'키워드';let h='';h+=`<div class="section"><div class="section-head"><h2 class="section-title" style="color:${p.color}">📌 추천 제목 TOP 5</h2><button class="copy-btn" onclick="cT(this)">📋 선택 제목 복사</button></div><div class="titles-list">`;d.titles.forEach((t,i)=>{const s=i===si;h+=`<div class="title-card" style="border-left-color:${p.color};${s?`background:${p.color}0d;border-color:${p.color};box-shadow:0 2px 12px ${p.color}22;`:''}" onclick="pT(${i})"><span class="title-num" style="background:${p.color}">${i+1}</span><span class="title-text">${esc(t)}</span>${s?`<span class="sel-badge" style="background:${p.color}">선택됨</span>`:''}</div>`;});h+=`</div></div>`;h+=`<div class="section"><div class="section-head"><h2 class="section-title" style="color:${p.color}">📝 최적화 포스팅</h2><button class="copy-btn" onclick="cP(this)">📋 복사</button></div><div class="post-box"><pre class="post-text">${esc(d.post)}</pre></div></div>`;h+=`<div class="section"><div class="section-head"><h2 class="section-title" style="color:${p.color}">🏷️ 최적화 ${kwL}</h2><button class="copy-btn" onclick="cK(this)">📋 복사</button></div><div class="kw-wrap">`;d.keywords.forEach(kw=>{h+=`<span class="kw" style="background:${p.color}12;color:${p.color};border-color:${p.color}33;">${esc(kw)}</span>`;});h+=`</div></div>`;document.getElementById('contentArea').innerHTML=h;}
function pT(i){sti=i;renderSec();}
function reGen(){setStep(2);document.getElementById('selectedBadge').innerHTML=`<span class="sp-badge" style="background:${sp.color}">${IC16[sp.id]} ${sp.name}</span><span class="sp-change" onclick="goHome()">다른 플랫폼 선택</span>`;document.getElementById('topicInput').placeholder=sp.ph;document.getElementById('genBtn').style.background=sp.color;document.getElementById('topicInput').focus();}

function cp(t,b){const fb=()=>{const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.left='-9999px';document.body.appendChild(a);a.select();try{document.execCommand('copy');}catch{}document.body.removeChild(a);};try{navigator.clipboard.writeText(t).catch(fb);}catch{fb();}if(b){const o=b.textContent;b.textContent='✅ 복사됨';b.classList.add('copied');setTimeout(()=>{b.textContent=o;b.classList.remove('copied');},2000);}}
function cT(b){cp(rd.titles[sti],b);}
function cP(b){cp(rd.post,b);}
function fmtKw(arr){return arr.map(k=>k.startsWith('#')?k:'#'+k.replace(/\s+/g,'')).join(' ');}
function cK(b){cp(fmtKw(rd.keywords),b);}
function copyAll(b){const p=sp,d=rd,kwL=p.id==='instagram'?'해시태그':'키워드';let c=`[${p.name}]\n\n📌 선택된 제목: ${d.titles[sti]}\n\n--- 전체 제목 후보 ---\n`;d.titles.forEach((t,i)=>c+=`${i+1}. ${t}\n`);c+=`\n--- 본문 ---\n${d.post}\n\n--- ${kwL} ---\n${fmtKw(d.keywords)}`;cp(c,b);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

document.addEventListener('DOMContentLoaded',()=>{renderGrid();loadTheme();
document.getElementById('topicInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();generate();}});});
